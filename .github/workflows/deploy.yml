name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deployments instead of cancelling in-flight ones. Cancelling a run
# mid-deploy (e.g. while it's polling the Pages API for status) can leave
# that deployment half-finished and cause the NEXT deploy to fail too with
# "Deployment failed, try again later" — queueing avoids that entirely.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /iceland-frumgerdir/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment_retry2.outputs.page_url }}
    steps:
      # The Pages deployment API occasionally hard-fails a clean, uncontested
      # deployment on its very first status check ("Deployment failed, try
      # again later") with no useful detail — a genuine backend flake, not
      # something caused by our workflow. actions/deploy-pages doesn't retry
      # a hard failure itself, so retry it here automatically instead of
      # requiring a human to push another commit. Only the last attempt is
      # allowed to actually fail the job.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - id: deployment_retry
        name: Retry deploy (transient Pages API failure)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 40

      - id: deployment_retry2
        name: Final retry (second transient failure)
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
